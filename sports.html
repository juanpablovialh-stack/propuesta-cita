<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SportStats Pro – Análisis & Probabilidades</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --accent: #00d4aa;
      --accent2: #f0883e;
      --accent3: #58a6ff;
      --red: #f85149;
      --green: #3fb950;
      --yellow: #d29922;
      --text: #e6edf3;
      --text2: #8b949e;
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── TOP NAV ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 1400px; margin: auto;
      display: flex; align-items: center; gap: 20px;
      height: 58px;
    }
    .logo { font-size: 20px; font-weight: 800; color: var(--accent); white-space: nowrap; }
    .logo span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 6px; }
    nav { display: flex; gap: 4px; flex: 1; overflow-x: auto; }
    nav::-webkit-scrollbar { display: none; }
    .nav-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 14px; border: none; border-radius: 6px;
      background: transparent; color: var(--text2);
      cursor: pointer; font-size: 14px; font-weight: 500;
      white-space: nowrap; transition: all .2s;
    }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn.active { background: var(--accent); color: #000; }
    .nav-btn .icon { font-size: 16px; }
    .live-badge {
      background: var(--red); color: #fff; font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 20px; animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── LAYOUT ── */
    .app { max-width: 1400px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
    @media(max-width:900px){ .app{ grid-template-columns:1fr; } }

    /* ── SIDEBAR ── */
    .sidebar { display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .card-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-header h3 { font-size: 14px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
    .card-body { padding: 12px 16px; }

    /* Match list */
    .match-item {
      padding: 12px; border-radius: 8px; cursor: pointer;
      border: 1px solid transparent; transition: all .2s; margin-bottom: 8px;
    }
    .match-item:hover { background: var(--surface2); border-color: var(--border); }
    .match-item.active { background: var(--surface2); border-color: var(--accent); }
    .match-meta { font-size: 11px; color: var(--text2); margin-bottom: 8px; display: flex; justify-content: space-between; }
    .match-teams { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .team-name { font-size: 14px; font-weight: 600; }
    .match-score { font-size: 18px; font-weight: 700; color: var(--accent); text-align: center; min-width: 40px; }
    .match-odds { display: flex; gap: 6px; margin-top: 10px; }
    .odd-chip {
      flex: 1; text-align: center; padding: 4px;
      background: var(--bg); border-radius: 6px; font-size: 12px; border: 1px solid var(--border);
    }
    .odd-chip .label { color: var(--text2); font-size: 10px; }
    .odd-chip .val { font-weight: 700; color: var(--accent2); }
    .live-dot { width:8px;height:8px;background:var(--red);border-radius:50%;display:inline-block;animation:pulse 1.5s infinite; }

    /* ── MAIN PANEL ── */
    .main { display: flex; flex-direction: column; gap: 16px; }

    /* Match header */
    .match-hero {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px 24px; text-align: center; position: relative; overflow: hidden;
    }
    .match-hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(0,212,170,.08) 0%, transparent 60%);
    }
    .hero-league { font-size: 12px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
    .hero-teams { display: flex; justify-content: center; align-items: center; gap: 24px; }
    .hero-team { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
    .hero-team-logo { width: 64px; height: 64px; background: var(--surface2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px solid var(--border); }
    .hero-team-name { font-size: 18px; font-weight: 700; }
    .hero-team-record { font-size: 12px; color: var(--text2); }
    .hero-score-box { min-width: 120px; }
    .hero-score { font-size: 48px; font-weight: 800; color: var(--accent); line-height: 1; }
    .hero-time { font-size: 13px; color: var(--red); font-weight: 600; margin-top: 4px; }
    .hero-status { font-size: 12px; color: var(--text2); margin-top: 2px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 8px; padding: 4px; border: 1px solid var(--border); }
    .tab-btn {
      flex: 1; padding: 8px; border: none; border-radius: 6px;
      background: transparent; color: var(--text2); cursor: pointer;
      font-size: 13px; font-weight: 500; transition: all .2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { background: var(--accent); color: #000; font-weight: 700; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Probability bars */
    .prob-section { display: flex; flex-direction: column; gap: 14px; }
    .prob-row { }
    .prob-header { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
    .prob-title { font-weight: 600; }
    .prob-values { display: flex; gap: 8px; }
    .prob-val { font-weight: 700; }
    .prob-val.home { color: var(--accent3); }
    .prob-val.draw { color: var(--text2); }
    .prob-val.away { color: var(--accent2); }
    .prob-bar-track { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; display: flex; }
    .prob-bar-home { background: var(--accent3); border-radius: 4px 0 0 4px; transition: width .8s ease; }
    .prob-bar-draw { background: var(--text2); transition: width .8s ease; }
    .prob-bar-away { background: var(--accent2); border-radius: 0 4px 4px 0; transition: width .8s ease; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px 8px; align-items: center; }
    .stat-home { text-align: right; font-weight: 600; font-size: 15px; }
    .stat-away { text-align: left; font-weight: 600; font-size: 15px; }
    .stat-label { text-align: center; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: .5px; }
    .stat-bar-row { grid-column: 1/-1; display: flex; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; gap: 1px; }
    .stat-bar-h { background: var(--accent3); border-radius: 3px 0 0 3px; transition: width .8s; }
    .stat-bar-a { background: var(--accent2); border-radius: 0 3px 3px 0; transition: width .8s; margin-left: auto; }

    /* Prediction cards */
    .pred-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 12px; }
    .pred-card {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px; text-align: center; position: relative; overflow: hidden;
    }
    .pred-card.hot { border-color: var(--accent2); }
    .pred-card.hot::before { content:'🔥 HOT'; position:absolute; top:6px; right:6px; font-size:10px; font-weight:700; color:var(--accent2); }
    .pred-card.value { border-color: var(--green); }
    .pred-card.value::before { content:'💎 VALUE'; position:absolute; top:6px; right:6px; font-size:10px; font-weight:700; color:var(--green); }
    .pred-label { font-size: 11px; color: var(--text2); text-transform: uppercase; margin-bottom: 8px; letter-spacing: .5px; }
    .pred-val { font-size: 26px; font-weight: 800; color: var(--accent); }
    .pred-sub { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .pred-conf { margin-top: 10px; }
    .conf-bar { height: 4px; background: var(--bg); border-radius: 2px; overflow: hidden; }
    .conf-fill { height: 100%; border-radius: 2px; }
    .conf-high { background: var(--green); }
    .conf-med { background: var(--yellow); }
    .conf-low { background: var(--red); }
    .conf-label { font-size: 10px; color: var(--text2); margin-top: 3px; }

    /* Strategies */
    .strategy-list { display: flex; flex-direction: column; gap: 12px; }
    .strategy-item {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px; display: flex; gap: 12px; align-items: flex-start;
    }
    .strategy-icon { font-size: 24px; min-width: 36px; }
    .strategy-content { flex: 1; }
    .strategy-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
    .strategy-desc { font-size: 13px; color: var(--text2); line-height: 1.5; }
    .strategy-badge { display: inline-block; margin-top: 8px; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; }
    .badge-high { background: rgba(63,185,80,.15); color: var(--green); }
    .badge-med { background: rgba(210,153,34,.15); color: var(--yellow); }
    .badge-low { background: rgba(248,81,73,.15); color: var(--red); }

    /* Form table */
    .form-dots { display: flex; gap: 4px; flex-wrap: wrap; }
    .form-dot {
      width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center;
      justify-content: center; font-size: 12px; font-weight: 700;
    }
    .form-w { background: rgba(63,185,80,.2); color: var(--green); }
    .form-d { background: rgba(139,148,158,.2); color: var(--text2); }
    .form-l { background: rgba(248,81,73,.2); color: var(--red); }

    /* Chart containers */
    .chart-wrap { position: relative; height: 220px; }

    /* Analyst section */
    .analyst-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 16px; display: flex; gap: 14px;
    }
    .analyst-avatar { width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent3));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#000;flex-shrink:0; }
    .analyst-name { font-weight:700; font-size:14px; }
    .analyst-role { font-size:11px;color:var(--text2);margin-bottom:8px; }
    .analyst-pick { font-size:13px;line-height:1.6; }
    .analyst-pick strong { color:var(--accent); }
    .stars { color:var(--yellow); font-size:12px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Responsive */
    @media(max-width:600px){
      .hero-teams { gap: 12px; }
      .hero-team-name { font-size: 14px; }
      .hero-score { font-size: 36px; }
      .pred-grid { grid-template-columns: repeat(2,1fr); }
    }

    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content:''; flex:1;height:1px;background:var(--border); }

    .badge { display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600; }
    .badge-live { background:rgba(248,81,73,.15);color:var(--red); }
    .badge-upcoming { background:rgba(88,166,255,.15);color:var(--accent3); }
    .badge-finished { background:rgba(139,148,158,.15);color:var(--text2); }

    .filter-bar { display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px; }
    .filter-btn { padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;transition:all .2s; }
    .filter-btn:hover,.filter-btn.active { background:var(--surface2);color:var(--text);border-color:var(--accent); }
  </style>
</head>

<div class="app">

  </div>
</div>

// ══════════════════════════════
//  STATE
// ══════════════════════════════
let currentSport = 'futbol';
let currentMatchId = 1;
let probChartInstance = null;
let goalsChartInstance = null;

// ══════════════════════════════
//  INIT
// ══════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  renderSport('futbol');
});

function switchSport(sport, btn) {
  currentSport = sport;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const data = SPORTS_DATA[sport];
  currentMatchId = data.matches[0].id;
  renderSport(sport);
}

function renderSport(sport) {
  const data = SPORTS_DATA[sport];
  document.getElementById('matchListTitle').textContent = `Partidos – ${data.label}`;
  document.getElementById('liveCount').textContent = data.liveCount;
  renderMatchList(data.matches);
  renderMatch(currentMatchId);
}

// ══════════════════════════════
//  MATCH LIST
// ══════════════════════════════
function renderMatchList(matches) {
  const container = document.getElementById('matchList');
  container.innerHTML = matches.map(m => `
    <div class="match-item ${m.id === currentMatchId ? 'active':''}" id="mi-${m.id}" onclick="selectMatch(${m.id})">
      <div class="match-meta">
        <span>${m.league}</span>
        <span>
          ${m.status==='live' ? `<span class="live-dot"></span> ${m.minute}` :
            m.status==='upcoming' ? `<span class="badge badge-upcoming">▸ ${m.minute}</span>` :
            `<span class="badge badge-finished">FT</span>`}
        </span>
      </div>
      <div class="match-teams">
        <div class="team-name">${m.homeEmoji} ${m.home}</div>
        <div class="match-score">${m.score}</div>
        <div class="team-name" style="text-align:right">${m.away} ${m.awayEmoji}</div>
      </div>
      <div class="match-odds">
        <div class="odd-chip"><div class="label">1</div><div class="val">${m.odds.home}</div></div>
        ${m.odds.draw ? `<div class="odd-chip"><div class="label">X</div><div class="val">${m.odds.draw}</div></div>` : ''}
        <div class="odd-chip"><div class="label">2</div><div class="val">${m.odds.away}</div></div>
      </div>
    </div>
  `).join('');
}

function selectMatch(id) {
  currentMatchId = id;
  document.querySelectorAll('.match-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`mi-${id}`);
  if(el) el.classList.add('active');
  renderMatch(id);
}

// ══════════════════════════════
//  MATCH DETAIL
// ══════════════════════════════
function getMatch(id) {
  for(const sport of Object.values(SPORTS_DATA)){
    const m = sport.matches.find(x=>x.id===id);
    if(m) return m;
  }
  return null;
}

function renderMatch(id) {
  const m = getMatch(id);
  if(!m) return;
  renderHero(m);
  renderProbabilities(m);
  renderStats(m);
  renderPredictions(m);
  renderAnalysts(m);
  renderStrategies(m);
  renderCharts(m);
}

function renderHero(m) {
  const statusHTML = m.status==='live'
    ? `<span style="color:var(--red);font-weight:700">🔴 EN VIVO ${m.minute}</span>`
    : m.status==='upcoming'
    ? `<span style="color:var(--accent3)">⏰ ${m.minute}</span>`
    : `<span style="color:var(--text2)">✅ Finalizado</span>`;
  document.getElementById('matchHero').innerHTML = `
    <div class="hero-league">${m.league}</div>
    <div class="hero-teams">
      <div class="hero-team">
        <div class="hero-team-logo">${m.homeEmoji}</div>
        <div class="hero-team-name">${m.home}</div>
        <div class="hero-team-record">${m.homeRecord}</div>
      </div>
      <div class="hero-score-box">
        <div class="hero-score">${m.score}</div>
        <div class="hero-time">${statusHTML}</div>
        <div class="hero-status">
          <span style="color:var(--text2);font-size:12px">Cuotas:</span>
          <strong style="color:var(--accent2)">${m.odds.home}</strong>
          ${m.odds.draw ? ` / <strong style="color:var(--text2)">${m.odds.draw}</strong>` : ''}
          / <strong style="color:var(--accent2)">${m.odds.away}</strong>
        </div>
      </div>
      <div class="hero-team">
        <div class="hero-team-logo">${m.awayEmoji}</div>
        <div class="hero-team-name">${m.away}</div>
        <div class="hero-team-record">${m.awayRecord}</div>
      </div>
    </div>
  `;
}

function normProbs(h, d, a) {
  const total = (h||0) + (d||0) + (a||0) || 100;
  const homeP = Math.round(h / total * 100);
  const drawP = d != null ? Math.round(d / total * 100) : null;
  const awayP = 100 - homeP - (drawP || 0);
  return { homeP, drawP, awayP };
}

function renderProbabilities(m) {
  const p = m.probs;
  const rows = m.odds.draw ? [
    { title:'Victoria Local', homeP:p.home, drawP:p.draw, awayP:p.away, homeLabel:m.home, awayLabel:m.away },
    { title:'1ª Parte – Local Gana', ...normProbs(Math.round(p.home*0.85), Math.round(p.draw*1.4), Math.round(p.away*0.75)), homeLabel:m.home, awayLabel:m.away },
    { title:'Ambos Anotan', homeP:62, drawP:null, awayP:38, homeLabel:'Sí', awayLabel:'No' },
    { title:'Más de 2.5 Goles', homeP:55, drawP:null, awayP:45, homeLabel:'Sí', awayLabel:'No' },
  ] : [
    { title:'Victoria', homeP:p.home, drawP:0, awayP:p.away, homeLabel:m.home, awayLabel:m.away },
    { title:'Favorito cubre spread', homeP:60, drawP:null, awayP:40, homeLabel:'Sí', awayLabel:'No' },
    { title:'Over total (línea)', homeP:55, drawP:null, awayP:45, homeLabel:'Over', awayLabel:'Under' },
  ];

  document.getElementById('probSection').innerHTML = rows.map(r => `
    <div class="prob-row">
      <div class="prob-header">
        <span class="prob-title">${r.title}</span>
        <div class="prob-values">
          <span class="prob-val home">${r.homeLabel} ${r.homeP}%</span>
          ${r.drawP ? `<span class="prob-val draw">Empate ${r.drawP}%</span>` : ''}
          <span class="prob-val away">${r.awayLabel} ${r.awayP}%</span>
        </div>
      </div>
      <div class="prob-bar-track">
        <div class="prob-bar-home" style="width:${r.homeP}%"></div>
        ${r.drawP ? `<div class="prob-bar-draw" style="width:${r.drawP}%"></div>` : ''}
        <div class="prob-bar-away" style="width:${r.awayP}%"></div>
      </div>
    </div>
  `).join('');
}

function renderStats(m) {
  document.getElementById('statFilter').innerHTML = '';
  const grid = document.getElementById('statsGrid');
  grid.innerHTML = m.stats.map(s => {
    const total = (s.home + s.away) === 0 ? 1 : (s.home + s.away);
    const hp = Math.round(s.home / total * 100);
    const ap = 100 - hp;
    return `
      <div class="stat-home">${s.home}</div>
      <div class="stat-label">${s.label}</div>
      <div class="stat-away">${s.away}</div>
      <div class="stat-bar-row">
        <div class="stat-bar-h" style="width:${hp}%"></div>
        <div style="flex:1"></div>
        <div class="stat-bar-a" style="width:${ap}%"></div>
      </div>
    `;
  }).join('');

  const formSection = document.getElementById('formSection');
  const formMap = {W:'W',D:'D',L:'L'};
  const classMap = {W:'form-w',D:'form-d',L:'form-l'};
  formSection.innerHTML = `
    <div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">${m.home}</div>
      <div class="form-dots">${m.form.home.map(r=>`<div class="form-dot ${classMap[r]}">${formMap[r]}</div>`).join('')}</div>
    </div>
    <div>
      <div style="font-size:12px;color:var(--text2);margin-bottom:8px">${m.away}</div>
      <div class="form-dots">${m.form.away.map(r=>`<div class="form-dot ${classMap[r]}">${formMap[r]}</div>`).join('')}</div>
    </div>
  `;
}

function renderPredictions(m) {
  document.getElementById('predGrid').innerHTML = m.preds.map(p => {
    const confClass = p.conf >= 65 ? 'conf-high' : p.conf >= 45 ? 'conf-med' : 'conf-low';
    const confLabel = p.conf >= 65 ? 'Alta confianza' : p.conf >= 45 ? 'Confianza media' : 'Baja confianza';
    const extraClass = p.hot ? 'hot' : p.value ? 'value' : '';
    return `
      <div class="pred-card ${extraClass}">
        <div class="pred-label">${p.label}</div>
        <div class="pred-val">${p.val}</div>
        <div class="pred-sub">Probabilidad</div>
        <div class="pred-conf">
          <div class="conf-bar"><div class="conf-fill ${confClass}" style="width:${p.conf}%"></div></div>
          <div class="conf-label">${confLabel}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderAnalysts(m) {
  document.getElementById('analystSection').innerHTML = `
    <p class="section-title">Análisis de Expertos</p>
    <div style="display:flex;flex-direction:column;gap:14px">
      ${m.analysts.map(a => `
        <div class="analyst-card">
          <div class="analyst-avatar">${a.avatar}</div>
          <div>
            <div class="analyst-name">${a.name}</div>
            <div class="analyst-role">${a.role}</div>
            <div class="analyst-pick">${a.pick}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <br/>
    <p class="section-title">Datos de Contexto</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">
      <div style="background:var(--surface2);border-radius:8px;padding:12px;border:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">FUENTE DE DATOS</div>
        <div style="font-size:13px;font-weight:600">📡 API + Google Sports</div>
      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px;border:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">MUESTRA HISTÓRICA</div>
        <div style="font-size:13px;font-weight:600">📊 Últimas 5 temporadas</div>
      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px;border:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">MODELO</div>
        <div style="font-size:13px;font-weight:600">🧠 Regresión + xG/xPoints</div>
      </div>
      <div style="background:var(--surface2);border-radius:8px;padding:12px;border:1px solid var(--border)">
        <div style="font-size:11px;color:var(--text2);margin-bottom:4px">ACTUALIZACIÓN</div>
        <div style="font-size:13px;font-weight:600">🔄 Cada 5 minutos</div>
      </div>
    </div>
  `;
}

function renderStrategies(m) {
  const badgeClass = { alta:'badge-high', media:'badge-med', baja:'badge-low' };
  const badgeLabel = { alta:'Alta confianza', media:'Confianza media', baja:'Baja confianza' };
  document.getElementById('strategySection').innerHTML = `
    <p class="section-title">♟️ Estrategias Recomendadas</p>
    <div class="strategy-list">
      ${m.strategies.map(s => `
        <div class="strategy-item">
          <div class="strategy-icon">${s.icon}</div>
          <div class="strategy-content">
            <div class="strategy-title">${s.title}</div>
            <div class="strategy-desc">${s.desc}</div>
            <span class="strategy-badge ${badgeClass[s.badge]}">${badgeLabel[s.badge]}</span>
          </div>
        </div>
      `).join('')}
    </div>
    <br/>
    <p class="section-title">⚠️ Aviso Legal</p>
    <div style="background:rgba(210,153,34,.08);border:1px solid rgba(210,153,34,.3);border-radius:8px;padding:14px;font-size:12px;color:var(--text2);line-height:1.6">
      Esta plataforma proporciona estadísticas y análisis con fines informativos y educativos. Las probabilidades son estimaciones basadas en datos históricos y modelos matemáticos. 
      <strong style="color:var(--yellow)">Las apuestas deportivas conllevan riesgo económico. Apuesta responsablemente.</strong> 
      Los resultados pasados no garantizan resultados futuros.
    </div>
  `;
}

// ══════════════════════════════
//  CHARTS
// ══════════════════════════════
function renderCharts(m) {
  // Probability donut/bar chart
  if(probChartInstance) probChartInstance.destroy();
  const probCtx = document.getElementById('probChart').getContext('2d');
  const labels = m.odds.draw
    ? [m.home, 'Empate', m.away]
    : [m.home, m.away];
  const dataVals = m.odds.draw
    ? [m.probs.home, m.probs.draw, m.probs.away]
    : [m.probs.home, m.probs.away];
  const colors = m.odds.draw
    ? ['#58a6ff','#8b949e','#f0883e']
    : ['#58a6ff','#f0883e'];

  probChartInstance = new Chart(probCtx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'Probabilidad %',
        data: dataVals,
        backgroundColor: colors,
        borderRadius: 8,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ` ${ctx.raw}%` } }
      },
      scales: {
        x: { grid: { color:'#30363d' }, ticks: { color:'#8b949e' } },
        y: { grid: { color:'#30363d' }, ticks: { color:'#8b949e', callback: v => v+'%' }, max: 100 }
      }
    }
  });

  // Goals/scores distribution
  if(goalsChartInstance) goalsChartInstance.destroy();
  const goalsCtx = document.getElementById('goalsChart').getContext('2d');
  const goalsLabels = m.goalsHist.map((_,i) => i===0 ? '0' : i===m.goalsHist.length-1 ? `${i}+` : String(i));
  goalsChartInstance = new Chart(goalsCtx, {
    type: 'line',
    data: {
      labels: goalsLabels,
      datasets: [{
        label: 'Frecuencia histórica %',
        data: m.goalsHist,
        borderColor: '#00d4aa',
        backgroundColor: 'rgba(0,212,170,0.1)',
        fill: true,
        tension: 0.4,
        pointBackgroundColor: '#00d4aa',
        pointRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color:'#8b949e' } },
        tooltip: { callbacks: { label: ctx => ` ${ctx.raw}% de partidos` } }
      },
      scales: {
        x: { grid: { color:'#30363d' }, ticks: { color:'#8b949e' }, title: { display:true, text:'Nº de Goles/Puntos', color:'#8b949e' } },
        y: { grid: { color:'#30363d' }, ticks: { color:'#8b949e', callback: v => v+'%' } }
      }
    }
  });
}

// ══════════════════════════════
//  TABS
// ══════════════════════════════
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if(tab === 'probabilidades') {
    const m = getMatch(currentMatchId);
    if(m) renderCharts(m);
  }
}
</script>
